build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 8
  CyclomaticComplexMethod:
    active: true
    threshold: 15
    excludes: ["**/ui/screen/**"]
  LongMethod:
    active: true
    threshold: 60
    excludes: ["**/navigation/**", "**/ui/screen/**", "**/ui/theme/**"]
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 10
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotatedParameter: ["Composable"]
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    thresholdInObjects: 15
    thresholdInEnums: 10
    ignoreDeprecated: true
    ignorePrivate: true
    ignoreOverridden: true
  NestedBlockDepth:
    active: true
    threshold: 5

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  SuspendFunWithFlowReturnType:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: "_|(ignore|expected).*"
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Exception
    allowedExceptionNameRegex: "_|(ignore|expected|e).*"
  TooGenericExceptionThrown:
    active: true

naming:
  active: true
  ConstructorParameterNaming:
    active: true
    parameterPattern: "[a-z][A-Za-z0-9]*|[a-z][a-z0-9]*(_[a-z0-9]+)*"
    excludes: ["**/model/**"]
  FunctionNaming:
    active: true
    excludes: ["**/test/**", "**/androidTest/**"]
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
    excludeClassPattern: "$^"
    ignoreAnnotated: ["Composable"]
  FunctionParameterNaming:
    active: true
    parameterPattern: "(_)?[a-z][A-Za-z0-9]*"
    excludeClassPattern: "$^"
  MatchingDeclarationName:
    active: false
  PackageNaming:
    active: true
    packagePattern: "[a-z]+(\\.[a-z][A-Za-z0-9_]*)*"
  TopLevelPropertyNaming:
    active: true
    constantPattern: "[A-Z][A-Z0-9_]*|[a-z][A-Za-z0-9]*"
    propertyPattern: "[A-Za-z][A-Za-z0-9]*"
    privatePropertyPattern: "_?[A-Za-z][A-Za-z0-9]*"
  VariableNaming:
    active: true
    variablePattern: "[a-z][A-Za-z0-9]*"
    privateVariablePattern: "_?[a-z][A-Za-z0-9]*"
    excludeClassPattern: "$^"

performance:
  active: true
  SpreadOperator:
    active: false
  UnnecessaryTemporaryInstantiation:
    active: true

potential-bugs:
  active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  ImplicitDefaultLocale:
    active: false
  UnreachableCatchBlock:
    active: true
  UnsafeCallOnNullableType:
    active: true

style:
  active: true
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 5
  ForbiddenComment:
    active: false
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: true
    excludes: ["**/util/**"]
  ReturnCount:
    active: true
    max: 4
    excludedFunctions: []
    excludeLabeled: true
    excludeReturnFromLambda: true
    excludeGuardClauses: true
  ThrowsCount:
    active: true
    max: 4
  UnusedPrivateMember:
    active: true
    allowedNames: "(_|ignored|expected|serialVersionUID)"
  UseCheckOrError:
    active: true
  WildcardImport:
    active: true
    excludeImports:
      - "java.util.*"
      - "kotlinx.android.synthetic.*"
